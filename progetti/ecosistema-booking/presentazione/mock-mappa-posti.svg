<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" role="img" aria-labelledby="mapTitle mapDesc">
  <title id="mapTitle">Mappa posti interattiva - schema</title>
  <desc id="mapDesc">Schema di mappa ombrelloni / posti a sedere con stati libero, selezionato, occupato.</desc>

  <rect width="1100" height="640" fill="#F5F4F0"/>
  <rect x="24" y="24" width="1052" height="592" rx="4" fill="#FFFFFF" stroke="#D9D8D3"/>

  <text x="48" y="64" fill="#171717" font-family="Georgia, serif" font-size="20" font-weight="600">Mappa posti - ombrelloni / platea</text>
  <text x="48" y="88" fill="#686868" font-family="sans-serif" font-size="13">Selezione visuale su griglia: libero, selezionato, occupato. Adattabile a spiagge, sagre, ristoranti, eventi live.</text>

  <circle cx="60" cy="120" r="8" fill="#245A52" opacity=".25" stroke="#245A52"/>
